body:
  text: 辨言漢如自束髮受書即有志於醫學既長而能悟乃廢寢忘餐窮日夜之力以赴之而尤喜推拿一科之切於實用旋遇良師訪祕笈習內外功以一指禪正宗為鵠的始恍然於先哲發明是科足以濟藥石之窮闡造化之祕解生民之厄也瘁十年之心力幸有成就徒以一官瓠系未獲暢行其志辛亥而後始以醫為專業與室人等分治男婦病症所遇艱險復雜怪奇之疾不可屢計竭其心力排萬難以圖之亦嘗有應手輒愈之成績病者紛紛垂詢驚為神祕實則何神祕之有其視吾術為神祕者蓋淺之乎測一指禪也一指禪之為用本可抉萬病之根起垂死之人而登諸壽域要而言之恃推拿之術以問世者必以醫學為始基以一指禪為利器窺其玄奧加以經驗所全活者日衆醫家不惜半世之辛勤病家即獲一生之幸福曩以各地人士謬採虛聲每持推拿一科何以能奏奇效之説來相咨詢遂草斯篇藉代裁答數年以來索閲者踵相接印刷甫成分發已盡蓋至今已十易版矣急就之章於一指禪之精微玄妙不足闡發其萬一惟書中所論本為開始研究推拿者説法編著專書願俟異日大雅君子恕其譾陋進而教之幸甚幸甚此不佞曩歲所著一指禪推拿説明書自序之言也今值醫話付梓之日欲傾吐腷臆而又憚辭費則徑録此序辨諸簡端以明吾志至於醫話之作理由何在動機何若又不可不無一言爰識其緣起如下兒子一照離講堂哦誦試驗室作業之生涯以致力醫學者二十年以推拿之術問世者十年嘗察其治病之成績凡舉重若輕化險為夷之處亦頗有足以貢獻於社會而慰我期望者病家以危難之症屬余偶值時間衝突則以畀一照罔弗愈焉知一照者既日衆余遂得稍稍息肩今夏苦熱杜門避暑以旬日為期診務悉委諸一照及室人漢藝爰招朋好煮茗清談以消永晝偶述生平應症之往事及一照漢藝二人之經歷聞者動容退告一照曰醫術關係人命如是其重君家治病之成績與夫目擊病家憤事之狀宜輯為一書廣其流傳俾一般人知所警惕有所遵循也一照然之以請於余其所恃之説為疾病之戕賊人類半由於醫家之誤人半由於病家之自誤苟能以一二醫家之得失一二病家之禍福昭示於百千萬億有病而求醫之人百千萬億無病而防患未然之人俾資借鏡指曲突而徙其薪遇迷津而渡以筏亦未始非裨益人群之舉味其言亦尚有理夜涼無俚爰就余與一照漢藝三人身歷目睹之事於千萬受診者之中擇其記憶所及而足借鏡者排日紀録得三十五則異一照編次之而付諸剞劂用付愛我重我者之雅望為提撕病家之具無以名之謬曰醫話敝帚千金聊自策勵文之工拙言之精粗非所計矣答客問這許多年來常有人寫信來問我推拿在醫學上到底有怎樣的效用一指禪推拿在醫理上又有什麼特殊的優點我當然是有問必答但恐怕已經問過的人是知道了要想問而沒有問過的人還不能普遍的明瞭因此趁這醫話將要印行的當兒把所有的問答歸納起來並作三條分別寫在下用極簡單的説話講個明白這決不敢借此為我個人宣傳不過希望大家對於一指禪推拿有一種相當的認識罷了漢如附識一問推拿和一切中西醫的比較如何答一切中西醫都要研究生理病理我斷不敢説推拿一定比一切中西醫都好不過其中有一個最大的分別是無論中西醫都要用藥推拿卻絶對不用藥既然用藥無論是中藥或西藥都有付作用藥吃錯了大誤其事固不必説就是有了好醫生用藥得當一面借藥力來治好了病一面因藥性的作用不免使生理上要起一種反應譬如滋補的藥吃多了就要防膩滯表散的藥吃多了就有些克伐這是最淺顯的例子其餘更講不盡許多推拿既不用藥就沒有因付作用而惹起的毛病可以説是有利無弊也可以説是專能療病而不會種病並且用藥治病或是吞服或是注射都要經過腸胃的消化與吸收利用著血液的循環只能算是間接的推拿治病病在那一部就推那一部卻是直接的所以有許多疑難症候病人不宜服藥的以及特別急症來不及服藥的推拿就格外來得有效了二問推拿和針灸的比較如何答針灸與推拿同是中國古代傳流下來的醫術就其歷史而論當然有同等的價值舊時醫書上説針長於宣壅滯灸長於通氣血古人謂之火輪三味足見針灸也自有其特殊的效用不過舊書上對於推拿和針灸的比較又有這樣幾句話説是推拿宣而不瀉故優於針通而不燥故優於灸可是這番話是根據醫理的平常不解醫理的人不得明白我如今再拿極淺近的道理來説就是推拿的治病能使病者通體舒適決沒有什麼不良的感覺講到針灸雖然在精於此道的也斷不會使人感到任何痛苦卻總免不了有些刺激至少也要起一點異樣的感覺假定屬於神經性的病或是病者本身神經衰弱感受不得些微刺激的就要因此發生弊害不如推拿來得和平適當了三問一指禪推拿和尋常各種推拿的比較如何答一指禪推拿和尋常各種推拿分別非精幹醫理者不能知道更非對於推拿一科有深切的研究者不能知道照古時醫籍所載推拿一科發明於岐伯著書十卷一曰按二曰摩三曰推四曰拿及梁武帝時達摩以為舊法過簡不敷應症復取舊法而光大之增入搓抄滾捻纏揉六法照這樣講起來尋常推拿只有四種一指禪推拿卻併合新舊各法加成十種足見推拿而不用一指禪在推拿本身上還只是偏而不全所以一指禪推拿比尋常推拿從醫理上講來得格外深從效力上講來得格外大換句話説尋常推拿有不夠用的地方就非用一指禪推拿不可尋常推拿有不能治的病也就非用一指禪推拿不可黃氏醫話荒郊入睡風寒絡某年夏前浙江省長張暄初氏病腿艱於行動已歷半年之久遍延中西醫診治均不見效乃延余推治張君曰醫者論鄙人之病見解紛歧莫衷一是或謂某由於虛弱或謂系鶴膝風又有謂系血液不清者然驗血以後此説已證明不確實未知癥結何在診察後告以系汗孔大張後為風濕所襲致成此病張君恍然憶及往事曰曩為先君營葬僕僕長途既抵墓地已筋疲力竭矣所御之裘盡為汗濕匍匐墓側竟昏然入睡旋由家人呼醒則荒郊風猛頓覺寒栗歸後病作自此以後步履維艱腿部雖迭經針灸而不良於行如故今聞先生言洞見病源矣囊者督辦盧公固嘗告余此病非就教先生不可而余因循至今始勞玉趾否則早瘳矣由是日必推治至秋而愈服活絡丹不復活某年秋有倪真寅君來就醫右手拘攣右臂與右腿行動頗不自如一照診察後告之曰君之病系肝風內煽氣血兩虧達於極點倪君曰餘三年以前曾來先生處求診時病猶未深而先生即云此症頗難痊愈余爾時殊不謂然即別就西醫診治三年以來非特不能痊愈且日見沉重先生之診斷神矣故再來求診推治時倪君初頗欣慰閲時稍久忽曰推治不日矣雖日見功效但余終苦其遲緩有友人勸余服活絡丹先生以為如何時有沈浚文君亦來此候診者聞倪君言急攙言曰以君之體氣活絡丹恐不宜服凡人既不幸而染病矣亟宜靜心療治萬不可急求速愈若求治之心太切今日服此藥明日易他醫非徒無益且恐一入岐途轉移延誤是欲求速而反緩也即如鄙人之病由於腎虧與痰濕初病時求愈之心過切亦與君同後以速愈不可求於是安心調治余倩一照醫生推治之時期較君更久猶不敢躁急君有數年之宿疾推治以來為日尚淺似應少安毋躁倪君沉思有頃乃曰余既受先生之術又聞沈君之言已決心不服活絡丹惟安心以此身付諸推拿矣一照謂之曰君能耐心甚善能耐心則木火不升木火不升則水可以無耗君病之痊愈雖緩然為期當不遠矣孰知倪君自此推治後即不復至一月以後倪君之夫人忽來曰外子自前此由先生處歸來後終不能忘情於活終丹今已遷入醫院矣茲因苦念先生請勞玉趾前往一晤一照諾之倪君既見一照涕泗汍瀾悽然曰余未能聽先生之指導已無救矣今辱枉存聊當訣別耳一照曰前月君在余處推治並無若何險象何遽一危至此曰服活絡丹所致也一照曰囑君勿服此藥胡遂河漢吾言耶曰余見他人有藉是而得愈者故亦服之初不料有今日之結果也一照曰君之病之宜於活絡丹非謂活絡丹不足以治病也世不乏靈丹妙藥可治對症之人而不可愈不合之症故必須衡量自身之病情若何也至是倪君默然惟請寄語沈浚文君謝其曩日規勸之盛意彼此互道珍重而別後倪君果不幸下世沈君聞之不勝唏噓甚矣哉誤投藥物之為害也未幾沈君病愈一日謂一照曰余鑑於倪群之結果益自幸未曾旗靡轍亂故有今日也沈君曾倩蔣竹莊先生維喬代書一聯相贈聯語為著手成春天地一指應病與藥技術通禪亦蔣公所撰也妊娠期內腹痛前清兩湖總督塗宗瀛氏之孫媳鍾氏女也先是其父嘗於某年患中風口眼歪斜四肢不能轉側多譫語勢甚危殆時女之兄鍾鑄甫君供職於杭之造幣廠得訊後商之同寅衆皆推余醫治應召而往診察後語鍾君曰此頑痰作祟年雖高苟醫治得當尚不足慮也問曾延他醫有其它診斷乎答曰未延他醫惟叔父現方行醫海上巴有電去日晚可來杭余復詳語鍾君曰尊公之病所以釀成之者痰也所以擴大其嚴重性者痰也多譫語痰為之耳幸勿信婦人女子之言乞靈神鬼苟延中醫服藥亦不必張皇失措亂投犀角羚羊等劑苟若是非特不能化痰且恐危機愈迫於是依法為之推治明日鍾君謂余曰家叔昨自上海來聞鄙人轉述先生之高論甚為敬佩且囑不必服藥即求先生推治可也余遂為之逐日施治病果日有起色神志亦清惟病者生平喜觀劇更嗜美味夫人善烹調故當每次推治時必令其夫人以點心進且所制之點心逐日弗令雷同余戒之曰觀劇雖娛視聽然久坐傷神美味雖饜口腹然多食傷胃幸留意焉未幾因女公子于歸塗氏頗覆勞動甲子齊盧戰起鍾氏全家遷滬自此不復謀面某年余醫寓對門來一新鄰循俗例分饋糕饅僕人登門適余自外歸一見之下喜謂余曰先生猶記三年前在湧金門外鍾家診病之舊事乎今先生之新鄰塗氏為鍾府之姻婭伊家之少夫人即我主人之女公子也並謂我家太夫人恆稱頌先生之醫術今既知先生與塗府比鄰而居不日必來造訪數日後鐘太夫人果偕其女來余家見其身御素服急詢以鍾老先生之消息太夫人喟然曰先夫自三年前避兵滬上寄居塗壻家以上海劇場甚多幾無日不置身其中又嗜肥醲稍拂其意即怒不得已從之一日在大世界遊戲場忽復攖中風一時手足無措只以戰氛正惡滬杭交通梗阻而病人又不便久居壻家乃多方設法賃屋別居未數日即不起矣戰事既平始運柩回杭茲有小女有病特囑其來杭調養不意竟得先生為比鄰小女之病可以無憂矣談次見余診務大忙母女遂興辭而去次日鐘太夫人偕其女及壻塗俊森君同來相與間話乃知彼此尚有戚誼塗君即述其夫人之病情曰拙荊溲不暢而常患腹痛月事已一月餘未至經診察筋脈以後斷為有孕塗君曰據他醫雲系乾血癆而先生斷為有孕殊令余徘徊岐路無所適從余曰若誤以乾血癆之治法治之必陷為小産而血崩在妊娠期內腹痛非用活血安胎之手術不能使胎不下墜也於是由漢藝為之推治十餘日後塗夫人恰值受孕二月之期鐘太夫人復鄭重問曰小女月事忽於今晨十時復至惟腹痛如故小溲稀少亦如故漢藝問之曰今晨月事來時能稍覺舒暢否答曰並不覺若何舒暢告以月事至而舒暢則非受孕今不覺舒暢且只一次即止仍系受孕無疑是歲夏令奇熱氣溫常在百度左右而塗夫人受孕已五月腹部之痛更劇母若夫惶急萬狀惟治後稍安然仍時止時痛太夫人不能無慮仍再三以是否懷孕為問漢藝曰醫家向不願對病人下斷語今彼此投契況有戚誼請斷然以是喜是男喜五字奉答鐘太夫人聞曰果如是則湯餅筵開之時當以雞子千枚為贈言已歡笑而去嗣後月分既深腹痛亦日甚一日鐘太夫人忽來大呼曰真怕問以何所懼曰余壻為小女延一女西醫吾知其為某西人之養女門愚醫院重地禁止喧譁之虎頭牌及兩軍棍其人則身御西服洋氣頗重至於醫術如何實不可知余壻力主延請此人余心所謂危故呼怕也移時塗君亦來連呼不得了不得了頃某女西醫來竟謂拙荊之腹痛由於胃部脹大不宜勞動診畢余請其處方擬留待前延之西醫斟酌詎伊答稱藥方須俟其歸去仔細斟酌吾今不欲往取藥方夫此病豈胃部脹大哉信其言服其藥必且無幸余曰是在君自決耳以余斷之尊夫人腹痛産後自止無礙也今為之推治無非維持現狀冀有以稍減其痛而已彼女西醫既有如是之診斷不妨稍緩數日再行推治塗君唯唯而去翌晨塗宅兩女傭扶塗夫人至促漢藝為之推治謂自停推後不能小遺內急殊甚脹欲死自是非推不能小解後因孫軍離杭時杭人紛紛他徒塗君初以其夫人每日需漢藝推治未能即遷後杭垣形勢日形緊張不得已遷滬逮十二月余醫寓亦遷至上海然彼此不知住址並無覿面之可能次年正月余乘車至靜安寺路梅白格路口忽聞車後有呼黃先生者回顧則鐘太夫人也又見後車一傭媼挾一小兒停車詢之曰男耶女耶曰男鐘太夫人詢住址余遞一名刺與之明日塗君來長揖致謝曰君家之術何其神也內子果於去冬生子臨蓐時果不覺苦産後腹痛果釋矣十月間鐘太夫人又偕其長次兩女同來謂其長女亦患月事停滯余診察後對曰令媛腹中之胎危險殊甚因其舌苔抽心再按其筋切其脈知其氣血兩虧之症以如此體氣而有身孕宜從速調治生産後非萬分小心不可太夫人自解曰余長女體並不弱特便道請先生診斷耳遂相偕去至次年夏聞鐘太夫人之長女不幸竟於産後殂謝並聞其次壻塗俊森君亦病歿於蕪湖云筋絡受損兩臂傷康南海在杭曾患臂痛由余治愈茲於未述康君醫病之經過以前先紀一瑣事某年康君曾與人在杭合營聚英旅社經理陳克卿君知拳術平日體氣素健後忽得中風症纏綿至次年耳餘名來上海就診時康夫人在滬亦患中風南海為之延德法名醫診治知陳君因病來滬即囑乘便就所延之西醫診治陳君不從乃毅然求余推治某日為之診脈後余詢之曰君何怒之甚陳曰先生何以知之曰由脈象知之於是陳君不能隱曰今日有一事實使鄙人不能不怒頃間有一人勸吾不必就先生診治彼有一素識之醫院由伊介紹診金可減其半吾聞至此甚惡其人輕視吾無力付醫費而必欲仰賴人之減值刻至先生處中心猶有餘忿不料先生竟能於脈象中察之也陳君頗豪爽有時來診言及武術輒在室中振衣攘臂以表演之余見其左右縱躍而喘力戒之未幾病愈悅甚嘗曰餘年已六十餘萬不料此病竟獲治殊屬幸事曩者居停康公曾囑余赴其滬寓就德法名醫診治余雖未從然康公之盛情良可感念今余既愈而康夫人尚在病中當轉為之介紹以報其厚意也時康夫人正苦久病從陳言而來由漢藝診治未幾果愈某年余至杭行醫陳君殷殷款待自是乃常有聚首之相會矣越三年康君以臂痛息影杭垣頗以兩臂不能伸縮自如為苦聞余在杭遂延至別墅診察後告以臂痛純由局部筋絡受傷所致並非體虧若注射補血劑或服其它藥品斷非所宜康君聞言乃自榻上一躍而起甚驚診斷之神曰先生謂余筋脈受傷斯言誠是蓋去年冬余反手令僕人卸大衣時不覺用力過猛致有此疾也由是連次推治漸見痊愈當醫治時康曰余讀先生所著推拿科説明書知先生之推拿的系古時一指禪之正宗也康君午睡多迎北窗每日必遊山一次更喜大啖余恆戒之曰北窗之下不宜臥息遊山固佳事然我公年已邁下山不覺其苦上山則咻咻然喘不免傷神應少跋涉至於大量之食更非高人所宜幸聽吾言力戒多食三年後康竟以多食海味而暴卒於青島云識肝病引火歸原葛德和陶器號主人葛璇生君一日來延余往診見其面如被酒神態反常身軀甚呆木雖在冬令而衣甚單薄問其病倩曰雙目不能上視不能下窺胃呆不思飲食勉強進餐亦堆積胃中不復能消化日間尚可勉御夾衣入夜則熱極不能覆被即覆單被亦非露雙足於被外不可登榻後固不能熟睡且亦不敢寐蓋睡酣則精立至矣更詢其病若干時曰已半年此半年中近二月為最甚以常情論之食少而又耗其精其人必虛弱不堪然葛君不覺十分疲憊且談話時發音尚清晰經反復診察後斷其病於腎者少而病於肝者多葛君曰鄙入之症經多數醫者診治均未能奏效即向來為余治病迭奏奇效之醫生亦無成績可言吾病殆真不起耶旋出示諸醫先後所處之方類皆抱薪救火揠苗助長之劑葛曰凡此諸方胡不妥者先生第恣言之萬勿循醫家之慣例有所顧忌安於緘默吾苦病魔之磨折久矣幸憐而教之余觀其情詞懇切爰告之曰諸方都不察病源所在而用紫河車之方尤謬紫河車之為物極腥臭寧能多服今連進二十餘劑無怪胃部呆滯不思飲食且時值冬至陽生時氣既上升故精下泄更甚君之病十之五誤於醫其它五分二分屬於腎三分屬於肝所有為君診治之醫者均著眼於腎而未顧及肝此其所以不能見效也君苟聽余診治則余治肝不治腎肝病既愈則腎病亦隨之而愈葛曰此誠余抱病以來第一次所聞之精闢議論然則此病果猶有救乎曰君之病誠深然尚有望葛問一日推治二次可乎余曰一指禪本有兩儀之法翌日清晨葛走伻來言昨日氣悶推治後稍舒請每日午飯後及晚飯後前往推治兩次十餘日後正推治時葛君忽曰腰以下勿推可乎余異其言曰此君之意乎抑他醫之主張乎若為君意則君固非醫家無足深怪若為他醫之意則余為盡責計不得不實告曰今日之事我為政若容他人置喙有百害而無一利所貴乎一指禪者乃在知病之所在而推治之並非如其它推拿家不知病源可以為他人之意思所左右也葛君不得已對曰此係他醫之意蓋以余近日滑精之量更多也余乃以淺顯之説喻之曰人體下部發泄之物精之外尚有便溺此君既謂推治下部恐遺泄更多何君之便溺仍如前艱澀乎既承不棄請為君詳論人體各部器官之為用夫人之臟腑譬猶所雇之工役無病則臟腑為良匠為忠僕設或有病當詳察其臟腑各部究系何部未能稱積以君之滑精論其病在腎腎何以虧以理推之當然為近婦人斫喪過度矣然此病設果因漁色幸喜悅余直言君墓木已拱矣豈猶能支持耶且連日與君晤談應對亦甚敏捷以余診斷知君之病定不專在腎而實在肝然則肝陽何以如是之盛若不深求其故則必以為君之體質如此但以余觀之當別有原因此殆蘊結特殊之熱而傷肝也葛君至是乃正色曰先生可謂心細如髮矣實告先生余陶器出口商也窯中工作必躬往監督余曰窯中之熱君何以堪曰不得已也病殆肇因於此乎余家業此已數世先代皆有肝旺病而余亦略知醫今聞先生之診斷吾病雖尚未愈然心中已覺非常愈快余曰君之病確在肝火太旺諸醫咸著意於腎不知腎猶君之僕焉肝又為腎之損友諸醫但顧念腎虧豫以接濟謀所以補益之而未知肝方日伺腎後分耗其所受之滋補是肝之侵耗一日不息則腎之虧弱一日不復徒事補腎無益有損此時亟宜息滅方張之肝火則腎水自源源而來譬彼陶器之在窯中其火候亦須適當否則器皿未有不壞者也葛君曰先生妙論信足發聾振瞶自今日始當專就先生推治不雜投藥劑矣余曰余向不反對藥品惟以為不宜亂投耳今再為君進一言君之病尤宜緩治而不可以求速效否則今日似覺進一步明日必退三步所謂欲速則不達者是也葛甚以為然乃逐日為之推治一日葛君曰近日胃納已不若前之呆滯雖不能熟睡然心神已較前寧帖矣如是約兩月後余向葛君曰此時君這胃部服紫河車之積穢已清可為君作第二步工夫法宜引火歸原明日當為君施用此手術臨行時密告其公子曰明日為尊公施用引火歸原之法當在某穴推治特恐令尊不能忍受耳公子曰萬一不能忍受又將如何曰不妨余當為推他穴代之惟推治他穴其功效非常遲緩請暫祕之待明日施用手術後再定方針也頃在令尊前並未言此恐其起心理作用不能順利進行也次日為葛君在某穴推治方數下葛君果覺不能受於是乃改推他穴俄頃葛君覺氣向下降稱炔不肯時葛公子在側曰先生昨日謂如用他穴代之奏效極緩何今日家嚴感覺愈快如是之速余笑而不答旋覆密告之曰君勿以為速公子曰其故安在曰此令尊之知覺經外顯耳非病勢減輕之現象凡病深之人感覺不應如此敏鋭且令尊之知覺經外顯實因肝經受傷過甚幸影響僅屬局部果周身如此則病必不可救一指禪之書曰凡人雖力大如牛健飯如虎者苟知覺經外顯生命不能延至三年以外也如此推治多日滑精之病漸減食後胃部漸舒適睡眠亦較安矣逮春令將屆時葛君以冬至時病大作深慮春令將復轉劇余曰當冬至時醫者對於君之病源皆未能有把握故病大發今余已知癥結所在且依推治之步驟為君療治春令來時當無防礙幸勿過慮後至春令果無大變惟雙目仍感不能上下視之苦乃勸其養鳥並蓄金魚間時可俯觀金魚仰矚籠鳥使雙目之視線於不知不覺中漸漸可以上下於是葛君乃依此主張與步驟靜心療治日有進境祈寒時能御裘夜能安眠晝能視事矣傴僂顴赤應手愈吳義齋君任杭垣警務處祕書長某年夏痰濕宿疾大作痛苦萬狀知余在杭遂來求治診察畢謂之曰所患之癬乃由於濕濕外發而為癬此係好現象今亟宜努力治痰不使阻滯氣機癬疥小疾置之可也推治後痰果活動秋間齊盧戰後吳君復任省署祕書長軍書旁午公務益劇積勞之後加以感冒於是牽動宿疾淹然病矣復延余醫治反復叮嚀非節勞靜養不克有濟某日症忽轉劇黏痰上湧口生白糜飲食不進委頓已極而癬全隱沒其家人謂吳君前一夕因要公奔走樓上下者凡五次未守節勞之戒嗣家人復出一藥方相示內有人參三分余始知其為參所誤乃婉言謝之云論病體之虛三錢猶恐難見效論濕阻之勢三分已大足僨事口生白糜並非全屬虛症蓋病者口內之白糜不能拭去者為虛今白糜一拭即去乃濕痰上湧肺中受病所致誤以為虛而進以人參殆矣余實不能為力請從此辭旬日後吳夫人之嫂周劍秋夫人挈其子來求醫由一照診治見病者傴僂特甚周夫人云吾子之病久矣諸醫見其兩顴發赤骨瘦如柴入夜輒咳嗆不止皆斷為癆瘵服藥打針咸不奏效近因襄理姑丈喪事乃知吳君之死因未從漢如先生之言鑄此大錯前車之覆後人足戒故來此也一照診察後謂之曰令郎病源甚簡單肺中為風寒所襲耳若在成婚以後不免釀為癆瘵今尚系未成年之人決不致成瘵惟不宜再進補乃為之推治果有起色體漸肥壯不復如前之瘦削腰背亦直伸不若前之傴僂嬉戲活潑一如常兒較之未推治前判若兩人一日咳嗆甚其母疑有變一照慰之曰是何足慮此仍系受熱後為風所襲之故推治數日其嗆必止母始恍然因憶及前日之事曰小兒日前正在家中嬉戲時因跳躍出汗解衣納涼忽聞門外鼓樂喧天未及披衣遽爾出門往觀先生所謂熱後受風殆系此時耶一照更囑其冬令須注意若能防護周到繼續調治則此症根株盡絶永不復發明年夏周夫人再挈其子女來並偕一中年男子詢之知即周劍秋君周君欣欣然有喜色曰鄙人在粵經營茶業居家時少前接家書知小兒病痊初未料推治之法有如是驚人之成績也歸來見其身軀健壯面色豐腴喜出望外惟是小女腰間生一硬塊頗感痛苦鄙人亦以身體肥碩常慮中風近已有痰壅之患若談話過多即不覺昏昏睡去今請先生為吾父女醫治當由漢藝為其女公子推治周君由一照為之推治均見效焉哭聲驚午夢某年春余醫寓自杭回滬鄭洪年先生之夫人病公子鄭寶照君因母夫人歷試中西醫俱未能獲效爰相招前往為之推治診察之下知系氣虛中滿之症旋以手術尋愈而鄭寶照君忽謂伊喉際似有物梗於中頗以為苦余曰此病系虛氣上升並無何物他日氣平梗即自止君亦曾延醫診視乎曰曾就西醫診察謂喉間實有一物一經療治即可不梗越數日後此君以鏡射照謂喉間已無物矣然余之梗如故遂亦聽其自然今遇先生特乘間求教於是為之推治其效驗較鄭夫人尤速也方余為鄭夫人醫治時一日鄭夫人曰余自經先生推治數日後病即轉輕所不解者即邇日之進步何以未能如開始推治時見功之速余曰夫人當開始推治時病勢甚重且服藥亦不見功乃令郎忽於此千鈞一髮之際幡然改計矚余推治此為對症之療法療法既能對症則病自減而夫人如重負初釋頓覺效驗之速譬彼急需金錢接濟者若驟有人貸以貨自覺此種接濟效力絶大逮此人之困既得稍舒則金錢之力似不若從前之巨矣今夫人病已去其大半自不覺有何顯著之效驗殊不知無形之中病體正著著進步也且當夫人病重時家務自不使夫人知之即知之而亦不能顧及今已漸趨康復自必勞心神顧家事遂不能安心養病病既不能安心靜養則其減退必緩此又自然之理也次日見鄭夫人之病突有加重之象詢其故知昨日午睡之際忽聞哭聲時其孫方發痧疹故聞聲倍益驚惶乃亟披衣起床奔出室外探視方知此哭聲乃在三層樓上蓋彼時方居亞爾培路三層樓正在修理一漆匠學徒因受其師之責撲而大哭夫人因此受驚不少故其病象遂如洛鍾之應也余故力勸其屏除一切靜心養病夫人從之不久果康復如常矣病體多勞終受損上海總商會會董田時霖君之至杭也余方在杭行醫一日有人來招赴六通寺診病謂系紹紳慕名來杭求診請速往至則田君殷勤致詞曰余因經營商業操勞過度致體氣日虧飲食減少夜不成寐遍及名醫診療俱不獲效嚮慕先生名欲仗一指禪之功恢復健康乃在滬遍訪先生之住址而不可得後有人謂先生已在杭行醫會有舊友某君力勸余易地靜養故來杭垣今可以就近領教矣余見其體氣虧弱萬分乃勸以屏除一切俗務靜心療養田君曰余不但屏除一切俗務且已不復念有此身矣余曰善君能不以此身為念則此身終能長保也推治之下一日有一日之進步飲食既增進夜眠亦安旬日後田君欲回滬料理公務謂余曰鄙人今不得不回滬然不久仍須來杭蓋旬日以還余得先生推治體氣已漸見恢復事竣後亟欲重來推治以竟全功也余曰君苟必須返滬可勿再回杭垣矣君嘗謂已置身世外專心療養竊以閣下邇日就滬間函電紛馳似仍復勞神矣須知醫治之效不敵形瘁神之害君此次遄行舟車勞頓最不宜於初愈之身故余以為既回上海可在滬設法調治節勞靜養萬勿再僕僕於滬杭道上也兩星期後田君果再至杭既見余乃曰余此行於病體並未有何不利雖處理事務日不暇給而不覺其憊也逮為之按筋切脈覺田君之體氣大遜於前全系虛陽外匯之象爰囑其不可過於樂觀彼猶自詡病體康復能忍飢耐勞余曰食少事繁常人其猶病諸而況君乎後其記室某君告余田君邇來大忙往往夜以繼日深以為苦余曰病體如斯勞心勞力又如斯其能久乎余荷田君信任目一指禪為萬能殊不知一暴十寒雖盧扁再生亦復奚濟余再當痛陳斯義作最後之忠告冀其幡然改計不復力疾治事庶猶有挽救之望亦所以報田君也翌日謂田君曰君以為病體有漸痊之象乎平凡醫家治病病勢危殆不足優病情復雜不足慮而獨患症之反復此在風寒暑濕之症尚可奮力挽救咄嗟立效者猶且以反復為大戒而況外強中乾如尊體者乎吾今謂尊恙已反復君必不信須知閣下之病體正如敝舟樹巨桅放乎中流一若毫無險象舟子憂之力下其帆以期穩渡此余推治見功之處也今閣下又復聽夕勞苦是帆已下而復飽張之桅質本已朽蝕乃又使之當疾風行見桅摧而舟覆耳幸速靜養毋貽後悔田君唯唯而終不能毅然息肩余知縱復推治亦無效矣遂婉辭之後田果在杭逝世甚矣病者不能靜養之為害也推拿奈何用蠻力某年春前浙江交涉使王省三君之夫人患肝氣症來就診當由漢藝為之推治方切脈王夫人見推拿亦須診脈深以為奇漢藝告以一指禪治病其望聞問切之功實較任何醫學更為周密寧有辨證之時而不診脈者夫人聞言為之動容推治多日病良已方王夫人受術時一日述其往事曰余前深信推拿之功用抱病之始曾登報徵求推拿女醫生一日果有一女醫生來談數語即舉掌在餘頭部及全身各部分一味揉擦余訝其不似推拿治病故婉辭之後雖有應徵者亦無大效自來此推拿後始知一指禪之可貴也前杭關監督袁思永君之太夫人手臂痠痛曾延一女醫生推拿詎知此女醫於推拿一道初無研究袁太夫人覺其施手術時不知癥結所在任意用力推按較不推時更覺痛楚後聞人盛稱漢藝乃延之推治第一語即以推拿是否痛楚為問對曰推拿止痛則有之萬無再增痛楚之理其有病已深筋絡麻木推治多次後氣血方始活動此時轉覺難受者斯則由麻木而得知覺系病有轉機之象殊不足慮但亦不可用蠻力推之使痛也目感受風寒者拿筋時或感痠痛一住手非惟不痠痛且覺舒暢今太夫人之病實系風濕施術時絶無痛楚也太夫人始但然推治後臂部之痠痛悉除無伸縮不便之苦矣吾人每謂精微玄妙之推拿學術反不為世所重相與扼腕太息今觀於以上二事則一般人對推拿無正確認識果誰之過歟風邪盡去久咳止楊樹芬君患咳嗽頗劇年久不愈來就一照推治一照為之按筋切脈以後知其肺部所襲之風因誤服補藥無從宣泄遂致久不愈爰據實告之楊君聞言甚以為詫逮一照反復講論彼始恍然於日逐推治以常情論之病當日減一日然若楊君之症則須經一種過程蓋即愈推愈咳必待風邪去淨始立見平復也楊君經推治後咳嗽果因推治而加劇楊雖已聞一照之預告然不免惶慮乃申説此係肺部風邪外泄之現象不足慮也後果逐漸減輕一日天氣驟寒復因感冒而傷風傷風愈咳嗽亦止此四年前之事也今春忽又來就一照推治乃詢以四年來之情形曰甚平安今春以天氣久寒宿疾又復發自知病根未斷終屬非計頗望繼續推治冀使此病永不復發也至春分節時咳嗽果止如楊君者對於一指禪之推拿可謂有絶對信仰者矣多投補劑致病世人於體氣稍覺疲弱時每喜服用補品以為能固本然服補品亦未必盡能獲益前合肥李國筠君以咳嗆多痰延余推治初頗應手嗣余以其舌苔厚膩脅部疼痛囑其停食銀耳李曰餘食此物已數十年似已成為習慣今先生既殷殷以停食為勸余當遵命暫停也後果並無不便之妙舌苔亦不如前之厚膩且咯痰亦較活動不若往者之費力李初頗以停食銀耳為得計繼忽慮身體終必虧弱復擬再進銀耳就商於余余曰君之患在痰今痰既活動自當屏此膩性之物以期早愈至於君之質體並非十分虧弱實不必鰓鰓過慮且多服銀耳益足塞君之肺氣他日若再因此吐血則危險不堪設想李聞余言惟惟否否而已翌年李侄以患筋骨痛延余推治言次談及李君病歿情形知其生前自經余醫治後病體稍平復即不復推治既而病復作則有人另薦他醫診治且不捨銀耳又亂投補劑寢至不救是雖余不幸言中然亦不聽忠告之遺憾也余非反對進服補品第須視其人之體質當補與否耳且年老者亦非全需滋補如武仲平君年已八十六體素健壯盛暑啖瓜不讓少壯之人嘗因多食冰緑豆粥而病經余治愈後腿中有疾又延余推治晤時必暢談舊事歷歷如在目前一日忽詢其公子曰爾亦能記憶余上次大便在何日乎曰似在黃醫生初來診之翌日余愕然曰果如公子言君已有十餘日不大便矣武曰是何足怪余向來每月大便二次苟有三次則轉覺其反常矣余乃默忖常人大便祕結固百病所由生然此老之消化器官或較常人為特強若武君者苟誤認其體質以為與常人無殊於是慮其腸胃有病而急於通利見其年事已高而勸以滋補則隔靴搔癢無益有損矣觀以上二事李以不當補而補終致不起武以不需補而不補竟占勿藥可見補品之為用非如菽粟可盡人飽啖也反胃症霍然而愈楊善卿君患胃病過深雖飲食數量如常而精神萎頓且每次進餐後所食之物必全數嘔盡否則日夜不安一日就余醫治問其病情知患胃病已七八年胃部不能容物非全數嘔盡不可此蓋反胃症也楊君更詢須推治若干時始能痊愈答曰君之病系內傷而非外感因天時與環境種種關係何時痊愈殊難確定若果貿然言何時能愈其人必非醫者楊君曰斯言殊有至理余適往某醫生處求診彼謂余之病甚易治余心甚奇此醫生之能斷默念吾病已七八年嘔吐之勢今又加劇將益難治彼既謂易治乃詢其果有何術使痼疾之除如此神速彼曰余家有祕藥服之七日必痊吾聞其有祕藥乃愈疑甚不願購服無把握之祕藥遂稍事寒暄而退特來先生處求治余曰君既以余之不敢確定為是余亦深以君之不求速愈為智楊君曰余若能於病初起時不求速愈病早愈矣惟其求速病轉加劇故今不敢再言速愈矣於是為之推治約二星期後楊君甚喜其病之輕減余曰未也君連日所以感覺愈快者是殆君之胃部逆氣經余推治以後稍為舒暢而已嘔吐雖稍減而宿積猶未盡除也越數日楊君曰吾病愈之期不遠矣詢以何故曰吾嚮者食量雖不減然珍饈入口味同嚼蠟昨日吾遊邑廟中覺攤上所售之食物咸有異香問曾購食否曰未敢多啖僅進點心四五件而已曰毋多食油膩今雖進四五件然必再嘔吐也明日果然越數日更嘔酸餿之水甚多余曰君所嘔吐既已覺有酸餿之水則胃部之宿積開始出動矣但願日日嘔此酸餿之水久之必逐漸減少以至於無則嘔吐亦不再作矣後果霍然大腹便便非受孕某年余等在滬行醫時醫寓比鄰有一婦人腹大異常漢藝甚以為奇謂余曰余觀比鄰之婦腹部隆起之狀與尋常孕婦異似病而非孕也竊願有機會以證余言且資研究焉一日彼婦翩然戾止以新鄰為名造謁漢藝延之入室展詢邦族知為雷姓談次向婦曰夫人娠幾時矣婦聞而赧然曰懷孕已一年有半真不知何日臨蓐也詢以曾否就醫曰余之月事每間三月一次據某西醫云孕婦月事三月一次勢必再延三月通常十月生産者此則必須十二個月或十五個月然今已一年有半矣更問曾就中醫乎曰所就診之中醫更多迄今藥方積數寸矣今歲七月餘感腹脹痛乃往前診之某醫院求治醫生囑余速歸彼當於晚間來余家接生而是晚腹痛忽止顧余所謁中西醫皆謂余系受孕藥方具在可以覆按明日俟黃醫生診務暇時當攜來就正並請再為余詳加診斷漢藝應之婦去向晚復來持中西藥方各一厚疊來求診曰吾不能待明日不知先生能破例為余診察乎漢藝本欲窮其腹部膨脹之究竟許之於是余與漢藝及一照三人為之輪流按筋切脈咸覺其並無受孕之現象乃以實告之詳檢其攜來之藥方用藥各異有為之破氣者有為之破血者其中又有用黃耆黨參等滋補品者而彼婦服此方之時正在月事初斷後三四個月且此方服之獨多乃詢其月事停後曾否有其它現象與痛苦曰無之惟外子年事較余稍長望子心切故百計為余醫治耳醫既謂系受孕外子亦欣然不疑並益加慎重力事調補今外子供職陸軍部余當以先生之診斷函告外子余曰函札恐未能敘述詳盡易滋誤解不如俟其歸來再定醫治之方針此時即囑余醫治亦未敢貿然從事蓋以女流子身在滬人皆知已受孕而余等獨持異議假使他日因推治而腹部恢復常態有多量之白色汙物下泄則人且誚余傷胎余實不任其咎也婦聞言乃曰外子將回滬度歲不知在此期間亦有其他危險否曰無妨婦遂辭去逮陰曆十二月下旬婦患血崩漢藝往治婦曰前日接餘外子家書謂不復回滬度歲余以年關在即不得已乃回鄉料理年終瑣事今日乘車回滬在火車中即覺腹痛深以月事忽來為慮蓋余腹痛時恆有此現象也逮抵滬站匆匆歸家稍進飲食後月事果來頭部暈甚乃即臥床此時猶覺月潮未止漢藝謂之曰以余之診斷如此現象極佳腹部之病或可以因此而去惟前承見告謂曾延西醫診斷云月事三月一來須再補三月何妨再延之診察婦曰余不欲再作無謂之麻煩矣前已將先生之診斷函報外子覆函亦以為然擬待其歸來偕余到府求診不料來書謂須正月初始回滬漢藝始為之推治告以明日月事若不急湧不妨靜養待正月間雷先生來滬再定方針明日又來相招謂自昨日推治後月事已不急湧今再請推治越日而此婦親來余醫寓謂月事已止且謂與三月前月事來時之情形相同惟較前稍多耳余曰然則猶以腹大為孕乎婦聞言微笑似猶默認其腹大為受孕明年仲春婦偕其夫雷素安君來詳詢病之真相余告以尊夫人之腹大實病而非孕不努力醫治恐成大患醫治而仍持安胎之政策則為患尤不堪設想雷君曰余實因望子心切故日冀其為孕而非病余曰但願月事如期而至斯大佳事耳雷曰鄙意仍擬稍事觀望余曰君意如斯余亦無如君何惟有一語君須記取尊夫人苦上下樓時感覺呼吸急促則不可再事觀望矣曰現在呼吸已感急促不知再有更危險之時乎余曰他日雖行平地亦必喘息不止此為其最危險之時矣雷君唯唯辭去至四月間雷君復來曰因內子稍一行動即感呼吸急促不思飲食有流下形似白帶之汙物甚多擬勞先生推治惟又慮推治以後陷為血崩余曰客臘為尊夫人推治乃在尊夫人血崩以後且推後血崩即止並非因推治而血崩君不必過慮且尊夫人有流下形似白帶之汙物甚多乃為腹內通暢之證明此固極好之現象也於是逐日由漢藝為之推治約兩月餘腹部漸見消縮飲食大進恢復常態矣某日雷君來問曰拙荊之病現已告痊余擬請先生繼續推治俾恢復昔日之健康惟經此一病之後不識將來亦能受孕否余曰常人每以子息有無之責任委之於婦人之身為之調經余以為男子亦未可卸此責任尊夫人之月事將因推治而調和矣然君之身體亦應加以相當注意雷君聞之憬然即由一照為之診察斷以肝木太旺腎水不足逮木火平後子息乃有望實現之期當在三年之後雷君醫治至孟冬時乃罷三年後雷君之夫人果舉一雄越數年又生一子焉中風得痊中風之症最為危險中於經者則口眼歪斜中於血者則半身不遂中於臟者多滯九竅中於腑者多著四肢人皆驚此症之不及預防殊不知病根已伏於數月乃至數年之前始則手指略有麻木以其旋愈不以為意繼則臂部似伸縮不便亦因旋即平復故又不以為意致令此症日深一日終至一發而不可收拾倘能幹病初萌時醫治得法未嘗不可轉危為安也如杭州前總商會會長宓延芳先生某年忽患中風延余為之推治詳為診察後宓之公子即某名醫所處藥方徵詢意見方中雖盡為名貴之藥但於病人無益向晚復走伻來延謂宓君自日間推治後稍覺清醒逮既服藥又復昏迷遂決定繼續推治並將另一醫生所開之藥方請為審查余覺其尚能對症乃一面令其煎服一面為之推治三四日後所用之藥因醫生一再更改又入歧途余遂語其公子曰近日藥方恐又不能對症公子固聰慧者遂停止進藥專由余推治二星期後病果霍然胃下垂有黃女士者患胃病延漢藝醫治依法循上而下按部推治詎伊忽謂胃已下垂請勿再向下推漢藝乃謂之曰女士當明醫理幸勿泥於形式試觀大雨之時人皆以為天低非天低也氣壓之低也逮云消雨止彼沉沉欲墜之天又復高爽矣今女士之病雖曰胃垂實則氣之下垂有以致之也曩有金夫人所患與女士同按法推治日就痊愈胃並未更向下垂也女士何鰓鰓過慮耶於是推治數次而愈每日吐痰升許人不能不有病有病不能不延醫服藥盡人而知之也延醫服藥固所以祛病然稍一不慎不但病不能祛且愈增痛苦甚且誤於醫藥而不能永其天年亦可傷已有王叔銘君年逾古稀精神猶矍鑠惟患痰症多年不愈日必吐痰升許每睡又必乾咳十餘次痰始得出深以為苦服藥數百劑曾無毫末之效不得已求助於余余向其索閲曩者諸醫所處之方內有一方最足以增其病勢而彼服之亦最多綜計所服石膏不下十數斤麻黃十餘兩余乃謂之曰君之體質可謂強固矣在他人患此病而服如許麻黃與石膏則墓木拱矣但就閣下而論亦僅能帶病延年欲完全産除病根殊不可能王曰余亦惟冀痛苦之稍減耳推治月餘之後彼忽以其病何以不能速除為問余曰君何健忘耶此病延誤至此程度必不能除根早為君言之矣雖然君可毋憂君之病可謂太平病王曰先生於病之上加太平二字誠百思不得其解余曰君不必思亦不必求其解君之不死即太平病之確證也繼續推治二月後每日所吐之痰已由升許而漸減為二三合每睡亦不若以前之多幹咳今王君尚健在但當日所受誤服藥劑之苦可謂甚矣未幾而有徐文彬君之事先是徐君之弟婦嘗因肝氣為漢藝治愈嗣伊以徐君雙眼模糊能否治愈來問當即告以病在肝腎可以推治是年秋季某日有一人愴惶來余醫寓自稱系眼科醫生因診療徐君目疾之關係假徐家設硯應診是日徐君告彼擬延余推治正談話間徐忽蹲乾地彼即抱之起復以彼既有延余推治之願乃來相邀既抵徐家此君忽揖余曰請先生稍待余遂坐廳事以待之移時一御西服者提皮包自內出余心私忖殆伊家所延之西醫也正私忖間彼眼科醫生復來揖余以再稍待為請詢其故彼乃吐實曰徐君以及夫人與其弟均欲延先生推治而其子女及壻則堅主延西醫余處其間左有為難故請先生稍待也余曰是何難既堅欲請西醫請西醫可矣然余頗願與病者一面俾得切其脈息以為討論之基礎乃延余入徐之病室切脈以後知確係中風之症頃西醫來已將冰帽加諸其首矣余甚為之危乃忠告其家人曰吾知君等對此病有以西醫為是者亦有以中醫為是者方議論紛壇莫衷一是也余意無論延西醫或中醫在家人立場言之彼此意見雖不同而挽救徐君生命之心則一也惟余有不得已於言者即徐君之病雖系中風然病勢不重且即使甚重冰帽亦非所宜因不合於中國人之體氣也倘以余言為謬不妨另延西醫從事商榷余知有經驗之西醫必不偏重機械式之理論而有冰帽之主張也五日後彼眼科醫生者復來相招余曰去亦奚益曰伊家始延西醫繼以未能奏效復改請中醫昨該中醫聞曾延先生推治而未果乃力勸其再請先生前去以圖挽救是時余若拒之不去病家必以余為意氣用事不得已乃從其請並謂此君曰徐君之病已無救去亦徒勞往返曰勿論生死姑勞玉趾及抵徐家徐君果不省人事如故爰謂其家人曰已無救余嘆君等不應過信第一次所延西醫之言遽加冰帽余既進忠言以後猶不另請西醫斟酌冰帽之是否能用以致一誤再誤茲雖改請中醫更招余來然此病已成絶症雖盧扁復生亦無回生之望其速為病人處理後書一二日內必有變也三日後果見報載徐君謝世矣王叔銘君誤於不究藥性致成痼疾而此君則誤於過信醫生且因一誤而斷送其生命尤可悲也病室內高宣佛號某年春岑西休之夫人病延漢藝往治岑夫人病已久肝氣串於筋絡左臂不能舉先是有人介紹一推拿醫生推治既不奏效病轉加劇於是即以推拿為不足道改延西醫用電氣療治豈知左臂因用電過度膚忽呈枯黑色且神志昏迷多譫語肝風內動勢甚危殆而家人對於藥劑則中西雜投食物則時而牛乳時而雞汁更可奇者一面延醫診治一面復謂奉佛家法師之命令家人四名晝夜在房內高宣佛號喧囂不已漢藝見此情形乃正色告之曰病人處此環境中不易平復診察之後黨外象雖若可治而細按病情實無生理歸告余認為此症已非人力所能挽回以不忍其無救姑令余於岑氏復來延請時前往一試以希冀於萬一詰朝來延余前往診察後告岑君曰尊夫人之病系肝風重症須待三星期後始可確斷能否獲痊也次日往推治岑君笑謂余曰拙荊之病有望矣今日已如廁且飲食亦可多進中西醫皆謂有望先生以為如何余診察後知其大便系醫者以藥劑攻出至於多進飲食亦屬反常益以人事昏迷較前更甚仍告以不能確有把握岑君聞之不悅遂不復來招矣同時宜興陶器商人葛旋生君葛君之病詳情另有所載亦因病延醫余偶與談及岑夫人之病狀及其難治之情形未幾而岑夫人之訃告赫然現於報章葛君謂余曰岑夫人之死屈指計之適閣下初次診治後之第三星期君之診斷可謂神矣余曰吾始為之按筋診脈時知其肝腎兩臟將絶其生命最多不過三星期因不便明言故諉謂須待三星期也明年岑君患痰喘延余醫治岑君傷感殊甚並未道及夫人病歿之事直至再越一年漢藝為其媳治肝胃病時其家人始重提往事相與太息岑夫人之病其初僅系肝氣復發而飲食雜進藥餌亂投一誤再誤至於肝腎皆絶雖盧扁復生無能為力矣五更泄瀉某年有湯楊錫琳女士之幼女因風寒痰滯之症在某醫院住療院醫謂其病入膏育拒絶療治乃延余推治余以前在杭時每值主日湯夫人與漢藝同在湖山堂聽道深敬其為人同屬基督信徒不容不排萬難以挽救之遂慨然往見女病勢果沉重乃謂湯夫人曰夫人對令媛之生死作何觀念曰余確知小女無生望但尚冀其或有萬一之轉機也余曰彼醫院中人既已拒絶是對於令媛無辦法矣今欲余為令媛療治非從余之辦法不可請先將所戴之冰帽除去並勿進任何食物湯夫人唯唯於是為之施術當時並不覺有何效驗次晨遣人持一書來略謂自昨日施手術後病勢甚有起色且已呱然而哭不可謂非好氣象也余繼續推治未及十日而愈明年春湯夫人之尊翁楊粹卿先生病肝氣經余推治一次後即有效驗次日復來邀及抵其家則又婉辭焉後知乃其公子輩以西醫斷為心臟病不能震動故謝卻推拿也移日湯夫人來致歉意且曰家嚴所患究系何症余曰肝氣上逆而已若謂心臟病不宜推拿此又臆斷之辭餘生平推治心臟病而奏效者亦指不勝屈先尊翁之症斷不可目為心臟病也越一年湯夫人忽腹部膨脹每日黎明必瀉就漢藝診治告以此係脾土衰弱之故即五更泄瀉症也宜培土以復元月餘而愈當其來診時詢其尊翁病狀曰家君之病因西醫謂其不能震動令終日偃臥病彖愈趨險惡不幸已下世矣言已不勝欷覷大啖豚蹄患便血蔣海容君患便血症初猶系大便中帶血一年後雖不疴亦常瀉血未瀉前必感腹痛痛時必小睡片刻睡後起床即瀉血瀉後始止痛如是者日必四五次深以為苦由一照為之診治見其面色如常脈息亦無虛象乃詢其曾否就他醫診治蔣君乃出各中醫所開之方示之各方大都為龜板鱉甲等滋陰止便血之藥劑蔣君曰服諸方後飲食且減少乃細索其致病之原因多方考慮斷其或系中毒詢其平時嗜食之物曰嗜食豚蹄日必啖一蹄且須紅煨者一日有友招飲呼酒傢俱三蹄以其二屬余而自啖其一他客作壁上觀而已後座中復有人戲言豬有四蹄今僅得其三功德未圓滿也因又增一蹄盡果余腹食後頓覺腹中不炔抵家即惡寒時余猶以為或系感冒繼患泄瀉嗣腹便血遂纏綿至今屈指已二年茲先生調我甲毒其在斯歟余病後一聞豬蹄之味即欲作嘔也一照囑其力戒一切不易消化之食物推治數月而愈失眠與思睡前浙江實業廳長雲海秋君患失眠症時余適在滬行醫云君特延至杭診察之後施以手術果安眠如常越二年復來延診治謂自失眠症愈後今忽覺酣睡太多且不思飲食延醫診治亦不獲效診察後告之曰當此春末夏初之時人每因黴濕而感困倦即所謂濕氣困脾之症也醫治旬日漸見功效云君因恐余不能久留杭地以可否服藥見詢余答曰君欲兼程並進自無不可是晚云君乃復延中醫診察明日以醫者所處之方相示余云此辛燥之劑如附片之類固足祛君之濕然多服則耗陰陰虧必再患失眠一指禪之功用既可攻濕又可養陰所謂一舉兩得決無顧此失彼之弊云君遂不復提及服藥之事越數日精神漸旺不似往日之貪眠然頗怪其虛象忽爾大現正默忖間云君忽留余晚餐余因督署早有人相邀治病故興辭而出並囑其慎防失眠之宿疾復發翌日云之公子來迓謂余曰昨日家嚴自先生去後精神極好且因先生堅辭晚餐頗感寂寞特請某中醫來作長談某中醫復行診察謂家嚴之病在腦云余深訝此君身為中醫而故趨時用西醫之術語當即詢云公子曰某中醫既謂令尊之病在腦彼果用何術以療之云公子曰先生見家嚴時家嚴必以某中醫之藥方就正也既見云君乃無一語及此因不便探詢推治時忽有一付官自督署來云君乃以昨夜某中醫之言告之隨將藥方授伊且謂藥不能入胃隨服隨吐方系龜板鱉甲等滋陰藥品方喜其或能因此一吐而有所覺悟也詎此付官亦知覺覺為加薑汁炒竹茹三分令再服余知云君成見已深不可為矣幸約期將滿爰語其公子期滿不再續診公子曰恐家嚴未必允先生辭余曰雖留亦不能從命明日云公子曰家嚴以病在腦將往上海入醫院孰知數日後噩耗傳來云君竟死於滬上友人家中甚矣病人之於醫藥不可不慎也重痢獲治王伯恭君之夫人患最重之痢疾由漢藝診治漢藝囑之曰夫人年事已高在此重病時除避免操心勞力外宜節制飲食尤忌藥石亂投免生意外危險王夫人答稱余家非富有且中西藥品已購服不少毫無進展今得延先生來醫已覺勉為其難更有何餘力再延他醫後經推治果日見痊可終乃霍然夫以年齡而論王夫人實較云先生為高而病症亦尤險然一治一不治此中消息至微蓋一者信仰堅定靜聽醫者療治一者信仰之心不堅其結果遂異語云欲速則不達信夫推治三日步履如常大律師仇豫之太夫人一日起立時忽覺兩腿痠痛步履維艱來就診由漢藝推治當其初次來時尚需人扶持不三日已能獨自行走矣先是太夫人之媳亦嘗延漢藝推治卒未能為之挽救論其起病至死之經過情形殊堪太息仇夫人初患頭風症經多數中西醫療治忽而用冰忽而用電痛苦不堪言狀久之始延推治病勢確已燎原然二日後覺痛楚漸減謂漢藝曰今日真較從前快樂矣蓋病雖不能即愈而推治時則非若電療之苦也諺云勿藥為中醫推拿之術又較不藥為上矣後以病根太深終至謝世若干起病時不雜藥亂投此症必可挽救也馳馬墜地腰部起塊吳少序君腰部起一硬塊余診察後詢其何不早治曰初因不甚痛苦擬聽其自然待其內消也近因稍覺纍贅乃延醫診治皆斷為石疽之症先生以為何如曰此病非癰疽也似系流注之類不知君於得病之前身體亦曾閃拗否若曾閃拗則病原即系氣血凝結曰先生診斷甚有見地蓋余好馳馬前在都中乘一烈馬中途墜地余當時並不覺何處作痛起而追逐復一躍上鞍逾數日腰部起核僅一小塊不甚痛苦亦不以為意最近則覺此硬塊日大纍贅益甚始延醫服藥然終不見消故來求治余曰此處乃腎俞穴萬萬不可開刀惟有使之消退推治約一月吳君曰日來此硬塊之範圍似覺較前為廣何耶曰君只覺面積加廣而未知其體積減低也夫體積減低面積自廣此乃病症移動之徵象不必慮也此後吳君每慮硬塊潰膿余曰君何憂耶此硬塊可消退可免出毒又一日吳君曰余今確信此處無膿歟余曰君前數日甚慮潰膿今忽又確信無膿何耶曰昨日曾經西醫用針探視余曰君實不應請西醫探視何以事前不來就商於余耶君之硬塊本無膿今經西醫用針管探視則無膿而變為有膿矣蓋硬塊內部之膜極薄經西醫用針管探視必致損硬里膜血液必腐化為膿但願西醫所下之針吸力不重里膜不因以損破是為萬幸吳君曰前余憂此處有膿先生乃謂無膿今經西醫探視確信其無膿而先生又恐其有膿此何故耶曰余非故欲立異實恐君患處之裡膜或為西醫針管之吸力所損破而有潰瘍之危險也吾第願吾言不中耳十餘日後吳君曰余所患之硬塊確有膿矣余曰前者君非確信其無膿歟何以今日又有膿耶吳曰余昨日又請西醫探視一次故知之因謂之曰君之症可不必推治矣蓋君患處適在腎俞穴無膿時猶可藉推治而使之漸消若有膿則無論任何醫法不能奏效也於是吳君止推後聞纏綿約一年許終於不治此缺乏耐性之為害也胃病不宜多服藥某年春鎮江傅根記紙號之女主人傅蔡孝貞女士患胃病七年不能飯僅啜液體之物曾延名醫療治未能獲效於是來滬由漢藝為之推治五旬而愈聞蔡女士來診之動機甚簡單而甚饒興趣蓋禪於服藥耳此種見解確有至理夫五味之食物最不適宜於胃者莫若苦味試觀大病以後之人未有不患胃弱者以其多服藥耳夫藥雖兼具諸味而入口無不苦者故凡有胃病者確以推拿療治最為有效體已多痰猶進補余等在杭時有督署科員張銘新君因其子病延推治時張於正臥於迎門之沙發上余見其面色即謂張君曰令郎之痰甚重張君曰先生猶未診脈何以遽知其痰重曰望而知之矣令郎近來之病狀能詳以告我否曰此兒常患暈厥至友某君現任督署付官固知醫者謂為虧症處一膏方令其進服余未待其言畢即告之曰服膏方後暈厥更甚此則不待檢視藥方而可知者也令郎之病在痰誤以為虛而用膏方以補之則痰乃益重痰益重則其暈厥之次數必愈多此一定之理也張君曰小兒服膏方後暈厥果較前更為頻數請十日不服膏方專以一指禪之法推治在此十日之內若暈厥如常不妨繼續再服膏方若暈厥減少則請盡棄膏滋靜心推治且十日之時期甚短補之未必竟全功不補不致有急變張君頗以為是遂逐日為之推治十日之內果暈厥減少後仍繼續推治一日張君忽謂余曰戚友中有主張為小兒早日完婚者先生以為可行否余曰令郎既為痰困且發育猶未健全胡遽成婚耶張君聆言遂輟是議逮推治三月後公子之病果愈方余為張公子推治時正值暮春天氣其父在側忽詢余曰人皆易夾衣余何仍畏冷之甚耶余曰尊府中人每感小恙輒喜服藥君殆過服表劑故平時易畏寒也飲食不進大便不通葉春泉之太夫人年逾六旬矣忽患一症飲食不進大便不通帶下甚多由漢藝為之診察告之曰太夫人之病實因中焦不暢飲食積滯濕閉於內所致亦曾延他醫診治否曰然言時出藥方相示檢視此方知醫者誤以為虛症用滋補藥並止其白帶漢藝深以為危遂謂葉君曰太夫人之體氣不宜子補又不宜止其白帶止則身必腫今腿部已微覺發腫苟因補與止之故再蔓延而上殆矣次日葉君曰昨聞尊論乃轉語於醫者醫者另擬一方囑請黃醫生裁政見其所開之方果為利濕之劑乃告之曰此方對症可用也推治數次大便果暢飲食亦進白帶自止厥疾瘳矣脈象已敗不可治陸榮廷寓上海時患咯血症延余診治既抵寢室見室中雖置有精美之床榻而陸君乃藉地臥身旁置一鐵柄之背錘知已在散功之候矣逮按筋診脈覺內部如古屋中置機設廠震蕩既久忽遇烈風暴雨崩屺必難幸免乃謝公子曰疾不可為矣公子聞言驚詫泣下沾襟請於無可挽救之中為萬一之勞力余曰醫家能治重症治險症而不能治絶症餘生平遇九死一生之病夷然不以介意從容推治轉危為安者夫豈少哉而非所論於此病也君希望余作萬一之努力余則以為縱復努力寧有萬一之希望耶不數日而陸氏逝世矣凡醫家治病有絶對不能與造化爭者此類是也葆愛過度小孩成病霞飛坊楊宅以小兒病因某夫人之介來邀診余見此兒尪弱不堪人皆御單夾衣而彼猶挾曠詢其何病曰病在胃余診察畢曰此孩並無胃病實因衣過多食過少故有此委頓之象耳若增其飲食薄其衣服必日見茁壯也兒之母駭甚急搖手曰先生體矣弗勞推治余無法可以喻之乃亦辭去翌日某夫人來詢昨日診治情形余乃一一詳告之夫人聞言憮然曰伊家對於小孩過於重視然提攜捧負愛之不得其道前月數孩除牛乳與烤牛肉以外不許食他物且恐他人誤投以雜食每餐後必禁閉小兒於室中弗令外出故皆夭殤余欲救此子之命故介紹先生為之推治初不料其有此一舉殊可嘆也天下事無獨有偶實有出乎意料之外者繼楊氏之後又有一張女士對余醫寓謂伊有邵姓友人之小兒患病托其介紹醫生伊以醫生甚難介紹惟曾讀余所著之推拿説明書知推拿不必服藥較為穩妥故來相邀余見邵之小兒並非重症不過胃中積食略感暑氣而已其時適值炎夏而期母不顧小兒受熱緊擁諸懷余因兒在母懷不便推治乃請將小孩安臥榻上推治時邵夫人猶左右護持之余問曰夫人如此掩護系恐令郎受痛乎果爾請勿慮推拿時毫無痛苦彼雖唯唯稱是度其心滋不悅夫父母之愛惜子女固屬情理之常然愛之不以其道則愛之適所以害之內地人民至今猶有不使小兒種痘者坐待天花之傳染是無異戕戮其所生又有力求小兒溫暖晝則厚其衣夜則厚其被褥以致小兒抵抗力薄易受外感更或希冀小兒肥壯不使其食粥飯而轉飽以肥醲滋膩之品無論新式舊式之家庭類此者比比也轉使其陷於病弱放眼以觀上述楊邵兩家之小兒即其明證諺云若要小兒安常帶三分飢與寒此實閲歷之談有子女者所當深思者也腎病勞動致變前公共祖界會審公廨會審官俞奠孫君患氣虛中滿甚劇余推治已告成功能下床行動矣一日謂余曰明日有要事須躬自處理臺從蒞此請較往日遲一小時餘力戒其勿勞動逮明日往診而肝腎兩脈俱變駭甚咎其不聽吾言俞君徒呼負負然自此病勢劇變余見其無可救之道乃敬謝不敏太息而退俞君遂終於不治惜哉凡病家一有轉機每每不遵醫生之囑任意勞動此危道也憶潮商鄭宜賓君患腎病西醫為之驗尿亦斷為腎臟受病已深以諸醫未能奏效乃延余為之推治見其多言傷神乃勸其多臥少動併力求靜默勿多勞彼此業務關係未能從余之忠告終日與朋輩論事舌敝唇焦不肯少休且仍勞動後卒無救此二君之病功敗垂成令人扼腕開刀不慎成痼疾周受之夫人曾因腿疾延余醫治同時復倩余推腰部謂兩年前生一外症請西醫開刀終未收口繼延中醫亦無效膿血淋漓痛苦萬狀余見其所患之部在腎俞穴系不可開刀之處而西醫竟不顧一切為之開刀不知此處若開刀則永無收口之日於是鄭重告伊曰腎俞穴萬不能開刀論理凡不能開刀之處最好以推拿之法推消方無害處設有毒將潰應將毒移至他處然後奏刀也今患處已深若欲活動筋絡不使行走感覺呆木固可推治聊減痛苦若望此外症收口雖一指禪亦不能為力矣後體氣雖已平復腿疾雖霍然而腰部卒未收口也右手不能執箸前浙江督署參謀長範育靈之弟君衡在閩任團長時忽手足拘攣遍延中西醫療治愈醫愈劇乃辭職至浙特來余處診治範君進膳時右手不能執著談話時期期訥訥行路若無人持扶不能逾閾嗣為之推治多日各部皆恢復原狀惟右手未能痊愈遂一面為之推治一面囑其搓無數紙團以箸挾之為戲經過多日運箸已靈活然遇餐時箝真食物時每及唇而落深以為苦爰囑其時背人假作籍食入口之練習又若干時卒能恢復原狀與常人無異矣遍身起紅塊吳乃衍君遍身起硬塊色微紅時隱時現初猶不覺痛癢後於每次發現時必覺疲憊不堪中西醫咸無法療治爰來推治診察之下料其必系皮膚曾於水中中毒吳君甚以此診斷為然曰嘗憶兒時家臨小河常喜入水捕魚一日出水後遍身忽起硬塊未幾即愈此後遂不敢捕魚然此病屢發屢愈其始並不頻數邇來則每間一月或半月必發一次推治後約二星期而愈蓋吳君初中毒時正在壯年血氣方剛抵抗力甚強故於發病時不覺痛苦後在某學校任教職體氣日就文弱故病發時甚感痛苦也當吳君推治時適有一患感冒之病人受術拿筋時痛極而號吳君曬之余謂之曰君毋笑人不能勝拿筋之苦君苟與此君所病相同由拿筋時亦必痛極而號推拿本毫無痛苦惟受風寒太重者拿筋時之痠痛雖只一剎那頃然頗難承受也未幾吳君忽走伻來延至校中謂因感冒不能起床拿筋時果不能忍痛大聲呼痛遂深服前日所言之不虛是無病者不知有病者之痛苦也兩腿拘攣臥不安鎮江要塞司令孫達蓀君之夫人胸部疼痛兩腿拘攣招往某療養院推治當由一照前去應診為之按筋切脈見舌苔抽心體甚瘦弱林夫人曰每次生産後容有失調之處且因主持家政之故每遇有病均未能靜心療養此次之病曾回杭請西醫診治迄未獲效嗣來滬住療養院治療數月亦毫無功效茲以女友之介延先生推治然又深慮推時更感痛楚蓋余睡眠之時雖被褥稍有觸動亦覺筋肉抽搐也當余初病時僅覺精神委頓並不疼痛自某中醫介紹一推拿醫生為余推治遂致胸部作痛兩腿拘攣蓋彼於推拿時以雙手按余之胃脘猛捶背部並以雙手力捏兩膝蓋如是一星期後兩腿遂曲不能伸飲食漸減精力日衰病象益趨重稍一轉側便感艱苦乃急詢某推拿醫生以故曰是不足慮不日當可見痊矣再越一星期痛如故忍無可忍乃不敢續延其療治後本院之西醫令余睡臥石膏床余因石膏拘束行動之術實弗能堪故爰幡然改計延先生推治一照乃慰之曰夫人之病純由體氣虧弱所致余用一指禪推拿之法推時必無痛苦依法推治一三數日痛苦漸減豈知彼療養院之西醫忍謂林夫人曰推拿雖善然亦不過維持現狀未能徹底痊愈也林夫人曰推拿之徹底與否余不必問惟知余病確有起色向之不得安眠者今已稍能入睡曩余以兩腿拘攣胸部疼痛為苦君謂宜療以太陽燈然亦並無大效反覺頭痛不能安睡今不照太陽燈卻藉推拿之功拘攣疼痛稍稍平復矣君謂推拿僅能維持現狀余實幸其能維持也且黃醫生曾謂余之病當靜養不宜急求痊愈但得氣血漸漸行動所謂流水不腐戶樞不蠹則自有進步也君必欲堅執徹底醫療之説敢問其道又安在哉某西醫乃謂伊處有德籍醫生善療此症療時縛全身墜以石塊使兩腿不致拘攣如是二月後乃能確定可否開刀割治林夫人訝甚復詢之曰是病亦須開割乎果須開刀所割又為何處耶曰脊骨之旁林夫人曰割後即能不復拘攣耶曰是不敢必林夫人以其病須受兩月綁縛之苦始能確定能否開刀既開刀矣又未能保其必愈為計殊左遂婉謝曰俟外子來滬再定來幾林君果自鎮來滬頗不以西醫之辦法為然商於一照意欲遄反鎮江一照以其在滬既無所適從又不能靜養轉不若徑歸鎮江爰贊成其主張數日後乘夜車離滬首途之日並約一照改為晚間推治俾可抵抗火車顛簸之苦詎知翌日復來相招曰昨晚已登車矣乃鐵路人員以病人未經鐵路醫生證明例不得登車無已回療養院改以今夕啓程故再勞大駕也一照推治後囑其返鎮江後須安心靜養勿庸人自擾雜藥亂投果能屏絶俗慮調攝得宜則回覆健康亦意中事耳此可謂臨別贈言矣以後結果如何雖不得知然殊不能不為林夫人惜蓋此種病症果能不亂投醫專賴一指禪推治為之補救則其成功可計日而待也一指呈功消腹脹大東煙草公司之顏少齋君因腹部脹大來就余推治顏曰所患之症水臌歟抑氣臌歟余按筋切脈後曰非臌也氣脹耳此症最忌行動若能遵余之囑安心推治必能痊愈後脹果漸消顏君快慰萬狀每遇戚友即暢談一指禪推拿之功能其女弟患腹痛延西醫診治斷為盲腸炎謂須開割顏氏兄妹不信此説後就漢藝推治斷為肝氣推治數日即愈妹倩孫君患臂痛顏力勸其乞靈於一指禪此外則彼公司之同事亦有多人以顏君之介紹來治病其妹嘗謂漢藝曰余兄不恆信服人而對黃先生獨讚不絶口此可見顏君對於一指禪信仰之深矣肝陽挾濕某年春余在杭時前滬道劉襄孫先生走伻邀至其寓所謂余曰鄙人兩腿不能行動者年餘延中西醫及推拿醫生療治詎知腿稍愈而遺精病隨之而起昨掃墓來杭舍弟雅士盛稱先生成績偉大始知尊駕在杭此行不期而遇先生頗自慶幸也診察後謂之曰君體肥碩氣短促而血液甚旺此症並非虛虧氣短不能行厚血肝陽挾濕熱為祟耳劉君曰鄙人素患肝陽且先生所謂濕熱亦誠有之蓋鄙人前曾因濕熱下注而患脫肛及脫肛愈腿忽不良於行殆系濕熱同祟歟余曰脫肛愈而腿部病系濕熱內蘊無處發泄之故也至於遺精之症若專用一指禪之法推治本可永絶根株況君之遺精實因推治腿部者不能統籌全局致有此流弊是遺精為推拿所釀成也今余為君推治他日腿愈遺精亦止矣三星期後劉君腿漸能行動而遺精之病亦不作十六年春余舉家避地回滬是年冬劉君復來邀診謂腿疾又作而腰部忽亦痠痛診脈後謂之曰久不親雅範今見君較前益肥碩此在常人固可稱發福而君則似不宜再肥矣劉君曰鄙人亦慮老年體肥易致中風放不敢俯首拾物不知常加推拿亦能免此否余曰常推則血自保其平衡氣亦不致壅塞確為預防中風之善法劉曰鄙人之脈亦有特別現象乎余曰此息至也但以君之肥碩息至不足為憂推治兩星期後腿疾平復腰部之痠痛亦愈然每隔三四月或半年發一次發時必推治借其稍愈即止未能繼續推治使病根徹底産除也去夏某日復來相邀推治之後劉君見告謂其公子櫻病甚重詢以何病曰寒熱問熱已退未劉曰前曾延中醫服藥至十六劑未能退熱近延西醫療治寒熱已減低矣據西醫驗血後診斷謂系傷寒症余深知閣下對於請治傳染病者一概拒絶故自始即不敢辱玉趾惟以閣下高明願述病情冀獲南針之導先生當首肯也言時出中醫所處之方相示皆發散之劑余白中醫當此炎夏對此病症極應用去暑濕攻積滯之藥乃不此之圖而一味發汗無怪其日日大汗而熱終不能退也劉君曰西醫謂血中發現傷寒病菌連日正以冰置其腹部冀減輕腸部熱度余曰西醫謂人之病每多病菌作祟者余亦深信斯言惟以冰置腸部則余嘗聞相識之西醫談及治療用冰問題皆以為不合中國人之體質此言與余之主張不謀而合余非不信熱漲冷縮之物理但念及腹部與腸胃因冰而冷縮試問彼腹中之暑濕與積滯為祟不將更甚乎劉君曰鄙人本意原不欲延西醫只因中醫未能奏效乃勉從親友之勸而延西醫耳余曰論理此病至四候以後若一帆風順即可不必眼藥惟慎重飲食靜養病體復原耳劉君曰此言鄙人亦嘗聞之余曰邇來公子之飲食如何曰遵西醫之囑日服牛乳雞子與雞汁等流質之食物余曰此種食物固屬流質然膩滯之弊仍不能免總宜慎重為是三四日後西醫擬為劉公子注射肛門助其大便劉君以此法是否合宜為問余曰熱苟已退不妨設法通其大便俾積滯腹中之暑濕可以清除不為臟腑害從此數日劉君曰自藥水注射肛門後日來大便甚暢且量亦甚多而頭部忽生外症余曰善哉此外症也公子之病無正當方式使之宣泄今忽生外症是猶人被禁錮不能由戶而出乃破窗越去也次日劉君曰鄙人今日成一極大之工作問奚為曰今日一西籍醫生此西籍醫生將病者頭部所有之瘡癤全數剖開或刺破流血甚多家人咸駭而卻走獨鄙人坐床前視此醫生施行手術惟不知此曾經剖刺之許多創口將來能否收口余曰群應注全力於公子之內病此外症不足慮也劉君曰彼西籍醫生已將創口縫好矣余曰此大足僨事昨嘗為君言公子之病無可宣泄其頭部既生外症實系內病自謀出路之現象正宜因勢利導頃聞開刀之後復為縫好創口是又等於錮禁其暑濕與積滯勿使外出誠恐內病不能再自謀出路矣曰血流甚多涼無大害余曰君以為多耶余意僅十之一耳明日劉君曰昨日先生去後病者忽厄逆不止不知有無妨礙余私忖久病而順乃胃絶之現象殊為惴惴然又不便直告之使其失望乃曰如此現象大非所宜余請暫不使公子服滋膩之品劉君唯唯明日又語余曰小兒之厄已因服藥而止似可無大患矣敢問此厄究何由而起余曰尋常之厄非胃部受寒即系受熱但久病之厄殊不可與尋常之厄同日而語也餘一方如是答覆一方私忖昨日之厄胃氣已絶彼能使之不厄可謂神乎其技矣但無論如何余終不信其能補人已絶之胃氣此或用藥強制之不作厄耳一日劉君曰鄙人今日遇一極負盛名之醫生彼謂吾兒病已全退余乍聞此言真有哭笑不能之感觸劉君復曰彼謂小兒心力甚弱除一面為之注射強心針一面更當使之儘量多食雞魚豬肉及蔬菜余曰病象如此而猶使之多食油膩殊為奇特且蔬菜亦惟煮湯飲之乃無患若大嚼菜根菜葉亦斷不宜於傷寒之久病者因傷寒之病在腸而蔬菜中多纖維質纖維質至不適於腸多進則腸更傷矣余所亟欲知者公子近來面色有無紅光入陰以來人事是否清楚以余度之公子面色應有油光且多譫語劉君曰然余於是知此病定無回生之望不數日劉公子死矣總之劉公子之病一誤於中醫之疏忽再誤於西醫之任性譬諸行舟一則誤其方向愈趨愈遠一則忽東忽西忽進忽退忽而飽張其帆忽而急轉其舵目的地決不能達傾覆之患且必難幸免也悲夫藥物之脫人於厄與致人於死其間不容髮哉余昔攻醫正惟懍然於用藥之可畏故幡然改計致力於一指禪區區此心亦聊為寡過之地耳劉公子恂恂儒雅而盛年夭折令人淒槍惋惜不能自己余向不診治時症藉避傳染故襄孫先生不以此相強余亦不破例為之效力至今思之有遺憾焉
